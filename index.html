<script>
function getEnabledStocks(){
  return Array.from(document.querySelectorAll('[data-code][data-on="1"]')).map(el=>({c:el.dataset.code,n:el.querySelector('.cn').textContent,tw:el.dataset.tw==='1'}));
}

async function buildCache(stocks){
  stocks=stocks||getEnabledStocks();CACHE_BUILT=true;CACHE_TS=new Date().toISOString();
  // 此處 V1.8 原始計算邏輯...
  updCacheSt();
}

async function fetchAll(){
  var prx=buildProxies();var stocks=getEnabledStocks();
  showL('抓取中...');$('fetchProg').classList.remove('hidden');
  let done=0;
  for(let s of stocks){
    try{
      if(s.tw) WEEKLY[s.c]=await fetchOHLCV(s,'1wk',prx);
      else DAILY[s.c]=await fetchOHLCV(s,'1d',prx);
      MONTHLY[s.c]=await fetchMonthly(s,prx);
    }catch(e){console.error(s.c,e);}
    done++; $('fetchFill').style.width=(done/stocks.length*100)+'%';
    $('loadTxt').textContent=`Fetching ${done}/${stocks.length} (${s.c})`;
    await new Promise(r=>setTimeout(r,300));
  }
  try{BENCH_MONTHLY=await fetchMonthly('^TWII',prx);}catch(e){}
  try{TNX_MONTHLY=await fetchMonthly('^TNX',prx);}catch(e){}
  await buildCache(stocks); sl('fetchLog','抓取成功',true); hideL();
}

function dlJson(){
  var obj={WEEKLY,MONTHLY,DAILY,BENCH_MONTHLY,TNX_MONTHLY,CACHE_TS};
  var blob=new Blob([JSON.stringify(obj)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`Momentum_Backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
}

function upJson(el){
  var reader=new FileReader(); reader.onload=function(e){
    var obj=JSON.parse(e.target.result);
    WEEKLY=obj.WEEKLY||{}; MONTHLY=obj.MONTHLY||{}; DAILY=obj.DAILY||{};
    BENCH_MONTHLY=obj.BENCH_MONTHLY||[]; TNX_MONTHLY=obj.TNX_MONTHLY||[];
    CACHE_BUILT=true; updCacheSt(); sl('fetchLog','還原成功',true);
  }; reader.readAsText(el.files[0]);
}

function updCacheSt(){
  var el=$('cacheTxt'); if(el) el.textContent=CACHE_BUILT?`Cache OK (${Object.keys(MONTHLY).length} stocks)`:'Not built';
}

// 其餘 V1.8 之 calcSignal, runBT 渲染代碼...
</script>
</body>
</html>
