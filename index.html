<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>矛與盾 V7.1 — 雙核回測引擎</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#0a0c10; --surface:#12161f; --surface2:#1a2030; --border:#252d3d;
--border-hi:#3a4560; --text:#e2eaf8; --muted:#6b7a99; --dim:#3d4a66;
--green:#00e5a0; --green-dim:#003d2a; --red:#ff4d6d; --red-dim:#3d0012;
--yellow:#ffb830; --yellow-dim:#3d2900; --blue:#4d9fff; --blue-dim:#001a3d;
--accent:#7eb8ff; --gold:#ffd166; --white:#f8faff;
}

body{
font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text);
min-height:100vh; padding:24px 20px; line-height:1.6;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.wrap{max-width:1100px;margin:0 auto;}

/* ── Header ── */
.hdr{
display:flex;justify-content:space-between;align-items:center;
border-bottom:2px solid var(--border-hi); padding-bottom:18px;margin-bottom:24px;
}
.hdr-title{font-size:22px;font-weight:900;color:var(--white);display:flex;align-items:center;gap:10px;}
.hdr-title span.v{font-size:12px;font-weight:600;background:var(--green);color:#000;padding:2px 8px;border-radius:3px;}
.hdr-sub{font-size:13px;color:var(--muted);margin-top:4px;}

/* ── 手動更新列 ── */
.data-bar{
display:flex;align-items:center;gap:12px;flex-wrap:wrap;
background:var(--surface);border:1px solid var(--border);
padding:12px 16px;margin-bottom:20px; font-size:13px;
}
.data-bar .input-group{display:flex;align-items:center;gap:6px;background:var(--bg);padding:4px 10px;border:1px solid var(--border-hi);}
.data-bar label{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;}
.data-bar input{background:transparent;border:none;color:var(--white);font-family:'IBM Plex Mono';width:60px;font-weight:700;outline:none;}

/* ── Tabs ── */
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--border);}
.tab{
padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);
border:none;border-bottom:3px solid transparent;background:none;transition:0.15s;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.panel{display:none;}.panel.active{display:block;}

/* ── Config ── */
.cfg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px;}
@media(max-width:700px){.cfg-grid{grid-template-columns:1fr;}}
.cfg-box{background:var(--surface);border:1px solid var(--border);padding:18px;}
.cfg-box h5{font-size:11px;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px;text-transform:uppercase;}

.f{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;}
.f label{color:var(--text);font-size:14px;flex:1;}
.f input, .f select{background:var(--bg);border:1px solid var(--border-hi);color:var(--white);font-family:'IBM Plex Mono';font-size:14px;padding:6px;text-align:right;max-width:120px;}

.upload-box{
background:var(--surface2);border:2px dashed var(--border-hi);padding:20px;text-align:center;margin-bottom:18px;transition:0.2s;
}
.upload-box:hover{border-color:var(--accent);}
.upload-box label{cursor:pointer;color:var(--accent);font-weight:700;}
input[type="file"]{display:none;}

.btn{padding:12px 28px;font-weight:700;cursor:pointer;border:2px solid;transition:0.15s;font-family:inherit;}
.btn-primary{background:var(--green);color:#000;border-color:var(--green);}
.btn-primary:hover{background:#00ffb3;}
.btn-update{background:transparent;color:var(--yellow);border-color:var(--yellow);padding:8px 16px;font-size:13px;}

/* ── 儀表板組件 ── */
.kpi-strip{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;}
.kpi{background:var(--surface);border:1px solid var(--border);padding:16px;flex:1;min-width:150px;}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.kpi-val{font-size:24px;font-weight:900;font-family:'IBM Plex Mono';}

.chart-wrap{background:var(--surface);border:1px solid var(--border);padding:18px;margin-bottom:16px;}
.table-wrap{background:var(--surface);border:1px solid var(--border);overflow-x:auto;margin-bottom:16px;max-height:500px;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{padding:10px;color:var(--muted);text-align:left;background:var(--surface2);position:sticky;top:0;z-index:2;}
td{padding:10px;border-bottom:1px solid var(--border);}
.tg{color:var(--green);font-weight:700;}.tr{color:var(--red);font-weight:700;}.ty{color:var(--yellow);font-weight:700;}

.loading-overlay{position:fixed;inset:0;background:rgba(10,12,16,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.hidden{display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">計算中...</div>
</div>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-title">🛡️ 矛與盾 <span class="v">V7.1 雙核版</span></div>
      <div class="hdr-sub">A/B 方法雙軌比較 ｜ CSV 上傳 ｜ 即時手動更新</div>
    </div>
    <div id="dataSourceBadge" style="font-size:12px;padding:4px 12px;border:1px solid var(--border-hi);color:var(--muted);font-family:monospace;">● 初始數據模式</div>
  </div>

  <div class="data-bar">
    <span class="mono" style="color:var(--yellow);font-weight:700;">今日觀測：</span>
    <div class="input-group"><label>HY OAS %</label><input type="number" id="mHY" value="3.1" step="0.01"></div>
    <div class="input-group"><label>TIPS 10Y %</label><input type="number" id="mTIPS" value="1.9" step="0.01"></div>
    <div class="input-group"><label>VIX</label><input type="number" id="mVIX" value="18.0" step="0.1"></div>
    <button class="btn btn-update mono" onclick="applyManualData()">⚡ 更新最後一日</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(event,'config')">⚙ 設定與上傳</button>
    <button class="tab" onclick="switchTab(event,'result')">📊 回測報告</button>
    <button class="tab" onclick="switchTab(event,'yearly')">📅 逐年比較</button>
  </div>

  <div class="panel active" id="panel-config">
    <div class="upload-box">
      <p style="margin-bottom:10px;">📤 <b>上傳整合資料庫</b></p>
      <p style="font-size:12px;color:var(--muted);margin-bottom:15px;">請選擇 Shield_Merged_Database.csv (欄位: Date, SP500, HY_Spread, TIPS_10Y, VIX, CAPE)</p>
      <label for="csvUpload">點擊選擇檔案</label>
      <input type="file" id="csvUpload" accept=".csv" onchange="handleFileUpload(event)">
      <div id="fileNameDisplay" style="margin-top:10px;font-size:12px;color:var(--green);"></div>
    </div>

    <div class="cfg-grid">
      <div class="cfg-box" style="grid-column: span 3;">
        <h5>回測模式 <span class="mono">ENGINE MODE</span></h5>
        <div class="f" style="justify-content: flex-start; gap: 20px;">
          <select id="cfgMode" style="width:250px;max-width:none;text-align:left;">
            <option value="BOTH" selected>A / B 雙軌比較 (推薦)</option>
            <option value="A">僅執行 方法 A (固定 Delta)</option>
            <option value="B">僅執行 方法 B (Z-Score)</option>
          </select>
          <span style="font-size:12px;color:var(--muted);">選擇要回測的引擎邏輯。雙軌比較可同時渲染兩套策略的績效。</span>
        </div>
      </div>

      <div class="cfg-box">
        <h5>一般參數 <span class="mono">GLOBAL</span></h5>
        <div class="f"><label>起始年份</label><select id="cfgStart"><option value="2000">所有歷史</option><option value="2016">2016</option></select></div>
        <div class="f"><label>初始資金</label><input type="number" id="cfgCap" value="100000"></div>
        <div class="f"><label>交易成本(bp)</label><input type="number" id="cfgCost" value="5"></div>
        <div class="f"><label>VIX 觸發</label><input type="number" id="cfgVix" value="35"></div>
      </div>

      <div class="cfg-box">
        <h5 style="color:var(--yellow)">方法 A：固定 Delta <span class="mono">METHOD A</span></h5>
        <div class="f"><label>加碼門檻 (≥)</label><input type="number" id="cfgAS150" value="60"></div>
        <div class="f"><label>標準門檻 (≥)</label><input type="number" id="cfgAS100" value="40"></div>
        <div class="f"><label>Delta 閥值(bp)</label><input type="number" id="cfgA_Delta" value="50"></div>
        <div class="f"><label>觀測窗口(天)</label><input type="number" id="cfgA_Win" value="120" title="計算過去 N 天的最低點"></div>
      </div>

      <div class="cfg-box">
        <h5 style="color:var(--green)">方法 B：Z-Score <span class="mono">METHOD B</span></h5>
        <div class="f"><label>加碼門檻 (≥)</label><input type="number" id="cfgBS150" value="60"></div>
        <div class="f"><label>標準門檻 (≥)</label><input type="number" id="cfgBS100" value="40"></div>
        <div class="f"><label>Z-Score 閥值</label><input type="number" id="cfgB_Z" value="1.5" step="0.1"></div>
        <div class="f"><label>窗口(天)</label><input type="number" value="500" disabled style="opacity:0.5"></div>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="runBacktest()">▶ 執行回測引擎</button>
  </div>

  <div class="panel" id="panel-result">
    <div class="kpi-strip" id="kpiStrip"></div>
    <div class="chart-wrap"><canvas id="navChart" height="350"></canvas></div>
    <div class="chart-wrap"><canvas id="ddChart" height="200"></canvas></div>
  </div>

  <div class="panel" id="panel-yearly">
    <div class="table-wrap">
      <table id="yearlyTable">
        <thead>
          <tr id="yHead"></tr>
        </thead>
        <tbody id="yrBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
'use strict';

let DATES = [], SP = [], HY = [], TIPS = [], VIX = [], CAPE = [];
let BT_RESULT = null;
let charts = {};

function initEmptyData() {
  const now = new Date();
  for(let i=0; i<600; i++) {
    const d = new Date(now); d.setDate(d.getDate()-i);
    DATES.unshift(d.toISOString().slice(0,10));
    SP.unshift(4000 + i*2); HY.unshift(3.5); TIPS.unshift(1.5); VIX.unshift(18); CAPE.unshift(30);
  }
}
initEmptyData();

function handleFileUpload(event) {
  const file = event.target.files[0];
  if(!file) return;
  document.getElementById('fileNameDisplay').textContent = "正在讀取: " + file.name;
  const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.split('\n').filter(l => l.trim().length > 0);
    const headers = lines[0].split(',').map(h => h.trim());
    const idx = { date: headers.indexOf('Date'), sp: headers.indexOf('SP500'), hy: headers.indexOf('HY_Spread'), tips: headers.indexOf('TIPS_10Y'), vix: headers.indexOf('VIX'), cape: headers.indexOf('CAPE') };
    
    DATES = []; SP = []; HY = []; TIPS = []; VIX = []; CAPE = [];
    for(let i=1; i<lines.length; i++) {
      const col = lines[i].split(',');
      if(col.length < 5) continue;
      DATES.push(col[idx.date]); SP.push(parseFloat(col[idx.sp])); HY.push(parseFloat(col[idx.hy]));
      TIPS.push(parseFloat(col[idx.tips])); VIX.push(parseFloat(col[idx.vix])); CAPE.push(parseFloat(col[idx.cape]) || 30);
    }
    fillNaN(HY); fillNaN(TIPS); fillNaN(VIX); fillNaN(SP);
    
    document.getElementById('dataSourceBadge').textContent = '● CSV 模式 (' + DATES.length + ' 筆)';
    document.getElementById('dataSourceBadge').style.color = 'var(--green)';
    alert("上傳成功！");
  };
  reader.readAsText(file);
}

function fillNaN(arr) {
  let last = arr.find(v => !isNaN(v)) || 0;
  for(let i=0; i<arr.length; i++) { if(isNaN(arr[i])) arr[i] = last; else last = arr[i]; }
}

function applyManualData() {
  const lastIdx = DATES.length - 1;
  HY[lastIdx] = parseFloat(document.getElementById('mHY').value);
  TIPS[lastIdx] = parseFloat(document.getElementById('mTIPS').value);
  VIX[lastIdx] = parseFloat(document.getElementById('mVIX').value);
  runBacktest();
}

// ── 核心運算 ──
function runBacktest() {
  const cfg = {
    mode: document.getElementById('cfgMode').value,
    cap: parseFloat(document.getElementById('cfgCap').value),
    cost: parseFloat(document.getElementById('cfgCost').value) / 10000,
    vix: parseFloat(document.getElementById('cfgVix').value),
    A: { s150: parseInt(document.getElementById('cfgAS150').value), s100: parseInt(document.getElementById('cfgAS100').value), delta: parseFloat(document.getElementById('cfgA_Delta').value), win: parseInt(document.getElementById('cfgA_Win').value) },
    B: { s150: parseInt(document.getElementById('cfgBS150').value), s100: parseInt(document.getElementById('cfgBS100').value), z: parseFloat(document.getElementById('cfgB_Z').value), win: 500 }
  };

  document.getElementById('loadingOverlay').classList.remove('hidden');
  
  setTimeout(() => {
    let eqA = cfg.cap, eqB = cfg.cap, bh = cfg.cap;
    let modeA = 'NORMAL', modeB = 'NORMAL', posA = 1.0, posB = 1.0;
    const curve = [], yrData = {};

    for(let i=1; i < DATES.length; i++) {
      const spRet = (SP[i] - SP[i-1]) / SP[i-1];
      const hyNow = HY[i] * 100;
      const erp = (100 / CAPE[i]) - TIPS[i];
      const f1 = lerp(erp, 0, 4, 10, 100);
      const f5b = lerp(hyNow, 250, 600, 80, 20);

      // ── Method A (Delta) ──
      let resA = { shield: 100 };
      if(cfg.mode === 'A' || cfg.mode === 'BOTH') {
        const startA = Math.max(0, i - cfg.A.win);
        let minHy = hyNow;
        for(let j=startA; j<i; j++) { if(HY[j]*100 < minHy) minHy = HY[j]*100; }
        const penaltyA = (hyNow - minHy) >= cfg.A.delta ? 20 : 0;
        resA.shield = Math.round(f1*0.5 + Math.max(0, f5b - penaltyA)*0.5);
        const nextA = nextMode(modeA, resA.shield, VIX[i], VIX[i-1], cfg.vix, cfg.A.s100, cfg.A.s150);
        const cA = (nextA.pos !== posA) ? cfg.cost : 0;
        eqA *= (1 + nextA.pos * spRet * (1 - cA));
        posA = nextA.pos; modeA = nextA.mode;
      }

      // ── Method B (Z-Score) ──
      let resB = { shield: 100 };
      if(cfg.mode === 'B' || cfg.mode === 'BOTH') {
        const startB = Math.max(0, i - cfg.B.win);
        const slice = HY.slice(startB, i);
        const mean = slice.reduce((a,b)=>a+b, 0) / slice.length;
        const std = Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2, 0) / slice.length) || 1;
        const zScore = (HY[i] - mean) / std;
        const penaltyB = zScore > cfg.B.z ? 20 : 0;
        resB.shield = Math.round(f1*0.5 + Math.max(0, f5b - penaltyB)*0.5);
        const nextB = nextMode(modeB, resB.shield, VIX[i], VIX[i-1], cfg.vix, cfg.B.s100, cfg.B.s150);
        const cB = (nextB.pos !== posB) ? cfg.cost : 0;
        eqB *= (1 + nextB.pos * spRet * (1 - cB));
        posB = nextB.pos; modeB = nextB.mode;
      }

      bh *= (1 + spRet);
      curve.push({ d:DATES[i], vA:eqA, vB:eqB, b:bh });

      const yr = DATES[i].slice(0,4);
      if(!yrData[yr]) yrData[yr] = { A0:eqA, Ae:eqA, B0:eqB, Be:eqB, bh0:bh, bhe:bh };
      yrData[yr].Ae = eqA; yrData[yr].Be = eqB; yrData[yr].bhe = bh;
    }
    
    BT_RESULT = { cfg, curve, yrData };
    renderUI();
    document.getElementById('loadingOverlay').classList.add('hidden');
    switchTab({target:document.querySelectorAll('.tab')[1]}, 'result');
  }, 100);
}

function nextMode(curMode, shield, vNow, vPrev, trgVix, s100, s150) {
  const vTrigger = vPrev >= trgVix && vNow < vPrev;
  if(shield >= s100) return { mode:'NORMAL', pos: (shield >= s150 ? 1.5 : 1.0) };
  if(curMode === 'NORMAL') return { mode:'OBS', pos: 1.0 };
  if(vTrigger) return { mode:'STRIKE', pos: 0.3 };
  return { mode:'RETREAT', pos: 0.0 };
}

function lerp(x, x0, x1, y0, y1) {
  const t = Math.max(0, Math.min(1, (x-x0)/(x1-x0)));
  return y0 + (y1-y0)*t;
}

// ── UI 渲染 ──
function renderUI() {
  const r = BT_RESULT;
  const last = r.curve[r.curve.length-1];
  const start = r.curve[0];
  
  let kpiHtml = '';
  if(r.cfg.mode === 'A' || r.cfg.mode === 'BOTH') kpiHtml += `<div class="kpi"><div class="kpi-label" style="color:var(--yellow)">方法 A (Delta) 總報酬</div><div class="kpi-val" style="color:var(--yellow)">+${((last.vA/start.vA-1)*100).toFixed(1)}%</div></div>`;
  if(r.cfg.mode === 'B' || r.cfg.mode === 'BOTH') kpiHtml += `<div class="kpi"><div class="kpi-label" style="color:var(--green)">方法 B (Z-Score) 總報酬</div><div class="kpi-val" style="color:var(--green)">+${((last.vB/start.vB-1)*100).toFixed(1)}%</div></div>`;
  kpiHtml += `<div class="kpi"><div class="kpi-label">B&H 總報酬</div><div class="kpi-val" style="color:var(--muted)">+${((last.b/start.b-1)*100).toFixed(1)}%</div></div>`;
  document.getElementById('kpiStrip').innerHTML = kpiHtml;

  drawNavChart(r);
  renderYearly(r);
}

function drawNavChart(r) {
  const ctx = document.getElementById('navChart').getContext('2d');
  if(charts.nav) charts.nav.destroy();
  
  let datasets = [{ label: 'B&H', data: r.curve.map(d => d.b), borderColor: '#3d4a66', borderWidth: 1, pointRadius: 0 }];
  if(r.cfg.mode === 'A' || r.cfg.mode === 'BOTH') datasets.push({ label: '方法 A', data: r.curve.map(d => d.vA), borderColor: '#ffb830', borderWidth: 2, pointRadius: 0 });
  if(r.cfg.mode === 'B' || r.cfg.mode === 'BOTH') datasets.push({ label: '方法 B', data: r.curve.map(d => d.vB), borderColor: '#00e5a0', borderWidth: 2, pointRadius: 0 });

  charts.nav = new Chart(ctx, {
    type: 'line', data: { labels: r.curve.map(d => d.d), datasets },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { type: 'logarithmic' } }, interaction: { intersect: false, mode: 'index' } }
  });
}

function renderYearly(r) {
  const h = document.getElementById('yHead');
  h.innerHTML = `<th>年份</th>`;
  if(r.cfg.mode === 'A' || r.cfg.mode === 'BOTH') h.innerHTML += `<th class="ty">方法 A 報酬</th>`;
  if(r.cfg.mode === 'B' || r.cfg.mode === 'BOTH') h.innerHTML += `<th class="tg">方法 B 報酬</th>`;
  h.innerHTML += `<th>B&H</th>`;

  const body = document.getElementById('yrBody');
  body.innerHTML = Object.keys(r.yrData).sort().map(yr => {
    const y = r.yrData[yr];
    const retA = ((y.Ae / y.A0) - 1) * 100;
    const retB = ((y.Be / y.B0) - 1) * 100;
    const retBH = ((y.bhe / y.bh0) - 1) * 100;
    
    let tr = `<tr><td>${yr}</td>`;
    if(r.cfg.mode === 'A' || r.cfg.mode === 'BOTH') tr += `<td class="${retA>0?'ty':'tr'}">${retA.toFixed(1)}%</td>`;
    if(r.cfg.mode === 'B' || r.cfg.mode === 'BOTH') tr += `<td class="${retB>0?'tg':'tr'}">${retB.toFixed(1)}%</td>`;
    tr += `<td class="${retBH>0?'':'tr'}">${retBH.toFixed(1)}%</td></tr>`;
    return tr;
  }).join('');
}

function switchTab(e, name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}
</script>

</body>
</html>
