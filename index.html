<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>矛與盾 回測工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a0c10; --panel:#111318; --border:#1e2330; --border2:#2a3045;
  --text:#e2e8f0; --muted:#4a5568; --accent:#60a5fa;
  --green:#10b981; --red:#ef4444; --gold:#f59e0b; --blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;padding:16px;}
h1{font-size:15px;letter-spacing:3px;color:var(--accent);text-align:center;margin-bottom:4px;}
.sub{font-size:9px;color:var(--muted);text-align:center;margin-bottom:20px;letter-spacing:1px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;}
.card-title{font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.field label{font-size:9px;color:var(--muted);letter-spacing:1px;}
.field input, .field select{background:#0d0f14;border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:4px;font-family:inherit;font-size:12px;width:100%;}
.apirow{display:flex;gap:6px;align-items:center;}
.apirow input{flex:1;background:#0d0f14;border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:4px;font-family:inherit;font-size:11px;}
.apirow input::placeholder{color:var(--muted);}
.btn{padding:10px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;}
.btn:active{opacity:.8;}
.btn-full{width:100%;}
#status{font-size:9px;color:var(--muted);text-align:center;min-height:16px;margin-top:6px;}
.ok{color:var(--green)!important;} .err{color:var(--red)!important;}
.progress-bar{background:#1a1f2e;border-radius:4px;height:8px;margin-top:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s;width:0%;}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:#0d0f14;border:1px solid var(–border2);border-radius:6px;padding:10px;text-align:center;}
.stat-label{font-size:8px;color:var(–muted);letter-spacing:1px;margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:900;}
.stat-sub{font-size:8px;color:var(–muted);margin-top:2px;}

/* Compare table */
.cmp-table{width:100%;border-collapse:collapse;font-size:10px;}
.cmp-table th{color:var(–muted);font-size:8px;letter-spacing:1px;padding:5px 8px;text-align:left;border-bottom:1px solid var(–border);}
.cmp-table td{padding:6px 8px;border-bottom:1px solid var(–border);}
.cmp-table tr:last-child td{border-bottom:none;}
.tag-old{color:var(–gold);}
.tag-new{color:var(–green);}
.tag-bh{color:var(–muted);}

canvas{max-width:100%;margin-top:8px;}
.chart-wrap{position:relative;height:220px;}

/* Yearly table */
.yr-table{width:100%;border-collapse:collapse;font-size:9px;}
.yr-table th{color:var(–muted);font-size:8px;padding:4px 6px;border-bottom:1px solid var(–border);text-align:right;}
.yr-table th:first-child{text-align:left;}
.yr-table td{padding:4px 6px;border-bottom:1px solid var(–border2);text-align:right;}
.yr-table td:first-child{text-align:left;color:var(–muted);}
.pos{color:var(–green);} .neg{color:var(–red);}

.loading-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,12,16,.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading-overlay.show{display:flex;}
.loading-text{font-size:11px;color:var(–accent);letter-spacing:2px;}
.spinner{width:32px;height:32px;border:3px solid var(–border2);border-top-color:var(–accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>

</head>
<body>

<h1>矛 與 盾　回測工具</h1>
<div class="sub">新舊 F5 邏輯 vs Buy & Hold｜FRED 數據驅動</div>

<!-- Loading overlay -->

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">載入數據中...</div>
  <div class="progress-bar" style="width:200px;"><div class="progress-fill" id="progressFill"></div></div>
</div>

<!-- API Key -->

<div class="card">
  <div class="card-title">[ FRED API 設定 ]</div>
  <div class="field">
    <label>FRED API KEY</label>
    <div class="apirow">
      <input type="text" id="apiKey" placeholder="貼上你的 FRED API Key..." autocomplete="off">
    </div>
  </div>
  <div class="field">
    <label>CORS Proxy</label>
    <select id="proxySelect">
      <option value="allorigins">allorigins.win（推薦）</option>
      <option value="corsproxy.io">corsproxy.io</option>
      <option value="thingproxy">thingproxy（備用）</option>
    </select>
  </div>
  <div class="field">
    <label>回測起始年份（BAMLH0A0HYM2 最早 1997）</label>
    <select id="startYear">
      <option value="1997">1997（最長，Wilshire 5000 起始）</option>
      <option value="2000">2000</option>
      <option value="2005">2005</option>
      <option value="2010" selected>2010</option>
      <option value="2015">2015</option>
    </select>
  </div>
  <button class="btn btn-full" onclick="runBacktest()">▶ 開始回測</button>
  <div id="status">— 輸入 API Key 後開始回測 —</div>
</div>

<!-- Results (hidden until run) -->

<div id="results" style="display:none;">

  <!-- Summary -->

  <div class="card">
    <div class="card-title">[ 總覽比較 ]</div>
    <table class="cmp-table">
      <thead>
        <tr>
          <th>指標</th>
          <th class="tag-old">舊邏輯</th>
          <th class="tag-new">新邏輯</th>
          <th class="tag-bh">Buy & Hold</th>
        </tr>
      </thead>
      <tbody id="summaryTable"></tbody>
    </table>
  </div>

  <!-- Equity curve -->

  <div class="card">
    <div class="card-title">[ 淨值曲線（以100起算）]</div>
    <div class="chart-wrap"><canvas id="equityChart"></canvas></div>
  </div>

  <!-- Drawdown -->

  <div class="card">
    <div class="card-title">[ 最大回撤曲線 ]</div>
    <div class="chart-wrap"><canvas id="ddChart"></canvas></div>
  </div>

  <!-- Shield score distribution -->

  <div class="card">
    <div class="card-title">[ 盾牌分數分佈（舊 vs 新）]</div>
    <div class="chart-wrap"><canvas id="scoreChart"></canvas></div>
  </div>

  <!-- Yearly returns -->

  <div class="card">
    <div class="card-title">[ 年度報酬對比 ]</div>
    <div style="overflow-x:auto;">
      <table class="yr-table">
        <thead>
          <tr>
            <th>年份</th>
            <th class="tag-old">舊邏輯</th>
            <th class="tag-new">新邏輯</th>
            <th class="tag-bh">Buy & Hold</th>
            <th>SP500</th>
          </tr>
        </thead>
        <tbody id="yearlyTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ── Proxy ─────────────────────────────────────────────────────────
const PROXY_LIST = [
  {
    name: 'allorigins',
    build: (u) => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u),
    parse: async (r) => { const w = await r.json(); return JSON.parse(w.contents); }
  },
  {
    name: 'corsproxy.io',
    build: (u) => 'https://corsproxy.io/?' + encodeURIComponent(u),
    parse: async (r) => r.json()
  },
  {
    name: 'thingproxy',
    build: (u) => 'https://thingproxy.freeboard.io/fetch/' + u,
    parse: async (r) => r.json()
  }
];

async function fetchFRED(seriesId, startDate, endDate, key) {
  const targetUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=${seriesId}&api_key=${key}&file_type=json&observation_start=${startDate}&observation_end=${endDate}&sort_order=asc&limit=10000`;

  const preferred = document.getElementById('proxySelect').value;
  const ordered = [...PROXY_LIST].sort((a,b) =>
    a.name === preferred ? -1 : b.name === preferred ? 1 : 0
  );

  let lastErr = null;
  for (const proxy of ordered) {
    try {
      setLoadingText(`[${seriesId}] 嘗試 ${proxy.name}...`);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 12000);
      const r = await fetch(proxy.build(targetUrl), { signal: controller.signal });
      clearTimeout(timer);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const raw = await proxy.parse(r);
      if (!raw || !raw.observations) throw new Error('無效回應');
      if (raw.error_message) throw new Error(raw.error_message);
      const map = {};
      for (const obs of raw.observations) {
        if (obs.value !== '.') map[obs.date] = parseFloat(obs.value);
      }
      console.log(`OK ${seriesId} via ${proxy.name}: ${Object.keys(map).length} rows`);
      return map;
    } catch(e) {
      console.warn(`FAIL ${proxy.name} / ${seriesId}: ${e.message}`);
      lastErr = e;
    }
  }
  throw new Error(`所有 Proxy 均失敗（${seriesId}）: ${lastErr?.message}`);
}

// ── Score functions ───────────────────────────────────────────────
function lerp(x, x0, x1, y0, y1) {
  const t = Math.max(0, Math.min(1, (x - x0) / (x1 - x0)));
  return y0 + t * (y1 - y0);
}

function calcF1(cape, tips) {
  const ey = 100 / cape;
  const erp = ey - tips;
  return Math.round(lerp(erp, 0, 4, 10, 100));
}

// 舊 F5
function calcF5Old(hy_bp, hyPrev_bp) {
  const hyD = hy_bp - hyPrev_bp;
  const f5base = Math.round(lerp(hy_bp, 250, 600, 80, 20));
  const f5penalty = hyD > 50 ? 20 : 0;
  return Math.max(0, f5base - f5penalty);
}

// 新 F5
function calcF5New(hy_bp, hyPrev_bp) {
  const hyD = hy_bp - hyPrev_bp;
  const f5_level = Math.round(lerp(hy_bp, 250, 800, 90, 10));
  let f5_delta;
  if (hyD > 0) {
    f5_delta = Math.round(lerp(hyD, 0, 200, 50, 0));
  } else {
    f5_delta = 50;
  }
  return Math.max(0, Math.round(f5_level * 0.6 + f5_delta * 0.4));
}

function calcShield(f1, f5) {
  return Math.round(f1 * 0.5 + f5 * 0.5);
}

// ── Backtest engine ───────────────────────────────────────────────
function runStrategy(dates, spMap, hyMap, tipsMap, shieldFn, s100 = 40) {
  // Position: 1.0 when shield >= s100, 0 otherwise (simplified: no OBS/RETREAT state machine)
  let equity = 100;
  let inMarket = true;
  const equityCurve = [];
  const ddCurve = [];
  const shieldHistory = [];
  let peak = 100;

  // We need 63 days of HY history to compute prev
  const dateList = dates;

  for (let i = 63; i < dateList.length; i++) {
    const d = dateList[i];
    const dPrev = dateList[i - 1];
    const dPrev63 = dateList[i - 63];

    if (!spMap[d] || !spMap[dPrev]) continue;

    const sp_ret = spMap[d] / spMap[dPrev] - 1;

    // Get HY (convert % to bp)
    const hy_bp = hyMap[d] ? hyMap[d] * 100 : null;
    const hyPrev_bp = hyMap[dPrev63] ? hyMap[dPrev63] * 100 : null;
    const tips = tipsMap[d] || 2.0;
    // CAPE: we don't have daily CAPE - use fixed reasonable value per era
    // approximate: use inverse of earnings yield proxy from VIX period
    const cape = 30; // fixed approximation for scoring purposes

    let shield = 50; // default
    if (hy_bp && hyPrev_bp) {
      const f1 = calcF1(cape, tips);
      const f5 = shieldFn(hy_bp, hyPrev_bp);
      shield = calcShield(f1, f5);
    }

    shieldHistory.push({ date: d, shield });

    // Position decision based on previous day's shield
    const pos = shield >= s100 ? 1.0 : 0.0;
    const dailyReturn = pos * sp_ret;
    equity *= (1 + dailyReturn);
    peak = Math.max(peak, equity);
    const dd = (equity - peak) / peak * 100;

    equityCurve.push({ date: d, value: equity });
    ddCurve.push({ date: d, value: dd });
  }

  return { equityCurve, ddCurve, shieldHistory };
}

function calcStats(curve, spMap, dates) {
  if (curve.length < 2) return {};
  const start = curve[0].value;
  const end = curve[curve.length - 1].value;
  const totalReturn = (end / start - 1) * 100;
  const years = curve.length / 252;
  const cagr = (Math.pow(end / start, 1 / years) - 1) * 100;

  // Daily returns for Sharpe
  const dailyRets = [];
  for (let i = 1; i < curve.length; i++) {
    dailyRets.push(curve[i].value / curve[i-1].value - 1);
  }
  const mean = dailyRets.reduce((a,b) => a+b, 0) / dailyRets.length;
  const std = Math.sqrt(dailyRets.map(r => (r-mean)**2).reduce((a,b)=>a+b,0) / dailyRets.length);
  const sharpe = std > 0 ? (mean / std * Math.sqrt(252)).toFixed(2) : '--';

  // Max drawdown
  let peak = -Infinity, maxDD = 0;
  for (const pt of curve) {
    peak = Math.max(peak, pt.value);
    maxDD = Math.min(maxDD, (pt.value - peak) / peak * 100);
  }

  // Win rate (days in profit vs SP500)
  return {
    totalReturn: totalReturn.toFixed(1),
    cagr: cagr.toFixed(2),
    sharpe,
    maxDD: maxDD.toFixed(1),
    days: curve.length
  };
}

function calcYearly(curve) {
  const byYear = {};
  for (const pt of curve) {
    const yr = pt.date.slice(0, 4);
    if (!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(pt.value);
  }
  const result = {};
  for (const yr in byYear) {
    const vals = byYear[yr];
    result[yr] = ((vals[vals.length-1] / vals[0]) - 1) * 100;
  }
  return result;
}

// ── Charts ────────────────────────────────────────────────────────
let equityChartInst, ddChartInst, scoreChartInst;

function destroyCharts() {
  if (equityChartInst) { equityChartInst.destroy(); equityChartInst = null; }
  if (ddChartInst) { ddChartInst.destroy(); ddChartInst = null; }
  if (scoreChartInst) { scoreChartInst.destroy(); scoreChartInst = null; }
}

function buildEquityChart(oldCurve, newCurve, bhCurve) {
  const labels = oldCurve.map(p => p.date);
  equityChartInst = new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '舊邏輯', data: oldCurve.map(p=>p.value), borderColor:'#f59e0b', borderWidth:1.5, pointRadius:0, tension:0.1 },
        { label: '新邏輯', data: newCurve.map(p=>p.value), borderColor:'#10b981', borderWidth:1.5, pointRadius:0, tension:0.1 },
        { label: 'Buy & Hold', data: bhCurve.map(p=>p.value), borderColor:'#4a5568', borderWidth:1, pointRadius:0, tension:0.1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:'#e2e8f0', font:{family:'Courier New',size:10} } } },
      scales: {
        x: { ticks:{ color:'#4a5568', maxTicksLimit:8, font:{size:9} }, grid:{ color:'#1e2330' } },
        y: { ticks:{ color:'#4a5568', font:{size:9} }, grid:{ color:'#1e2330' } }
      }
    }
  });
}

function buildDDChart(oldDD, newDD, bhDD) {
  const labels = oldDD.map(p => p.date);
  ddChartInst = new Chart(document.getElementById('ddChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '舊邏輯', data: oldDD.map(p=>p.value), borderColor:'#f59e0b', borderWidth:1.5, pointRadius:0, fill:true, backgroundColor:'rgba(245,158,11,.05)' },
        { label: '新邏輯', data: newDD.map(p=>p.value), borderColor:'#10b981', borderWidth:1.5, pointRadius:0, fill:true, backgroundColor:'rgba(16,185,129,.05)' },
        { label: 'Buy & Hold', data: bhDD.map(p=>p.value), borderColor:'#4a5568', borderWidth:1, pointRadius:0, fill:true, backgroundColor:'rgba(74,85,104,.05)' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:'#e2e8f0', font:{family:'Courier New',size:10} } } },
      scales: {
        x: { ticks:{ color:'#4a5568', maxTicksLimit:8, font:{size:9} }, grid:{ color:'#1e2330' } },
        y: { ticks:{ color:'#4a5568', font:{size:9} }, grid:{ color:'#1e2330' } }
      }
    }
  });
}

function buildScoreChart(oldScores, newScores) {
  // Histogram: bucket 0-100 in bins of 10
  const bins = Array.from({length:10}, (_,i) => `${i*10}-${i*10+10}`);
  const oldHist = new Array(10).fill(0);
  const newHist = new Array(10).fill(0);
  for (const s of oldScores) { const b = Math.min(9, Math.floor(s/10)); oldHist[b]++; }
  for (const s of newScores) { const b = Math.min(9, Math.floor(s/10)); newHist[b]++; }

  scoreChartInst = new Chart(document.getElementById('scoreChart'), {
    type: 'bar',
    data: {
      labels: bins,
      datasets: [
        { label: '舊邏輯', data: oldHist, backgroundColor:'rgba(245,158,11,.6)', borderColor:'#f59e0b', borderWidth:1 },
        { label: '新邏輯', data: newHist, backgroundColor:'rgba(16,185,129,.6)', borderColor:'#10b981', borderWidth:1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:'#e2e8f0', font:{family:'Courier New',size:10} } } },
      scales: {
        x: { ticks:{ color:'#4a5568', font:{size:9} }, grid:{ color:'#1e2330' } },
        y: { ticks:{ color:'#4a5568', font:{size:9} }, grid:{ color:'#1e2330' } }
      }
    }
  });
}

// ── Main ──────────────────────────────────────────────────────────
async function runBacktest() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { setStatus('請先輸入 FRED API Key', 'err'); return; }

  const startYear = document.getElementById('startYear').value;
  const startDate = `${startYear}-01-01`;
  const endDate = new Date().toISOString().slice(0,10);

  showLoading(true, '抓取 Wilshire 5000...', 10);

  try {
    // Fetch all series
    setLoadingText('抓取 Wilshire 5000...'); setProgress(10);
    const spMap = await fetchFRED('WILL5000INDFC', startDate, endDate, key);

    setLoadingText('抓取 HY Spread...'); setProgress(30);
    const hyMap = await fetchFRED('BAMLH0A0HYM2', startDate, endDate, key);

    setLoadingText('抓取 TIPS 10Y...'); setProgress(55);
    const tipsMap = await fetchFRED('DFII10', startDate, endDate, key);

    setLoadingText('計算回測...'); setProgress(75);

    // Build sorted date list from SP500
    const dates = Object.keys(spMap).sort();

    // BH curve
    const bhCurve = [];
    const bhDD = [];
    let bhEq = 100, bhPeak = 100;
    for (let i = 64; i < dates.length; i++) {
      const d = dates[i], dp = dates[i-1];
      if (!spMap[d] || !spMap[dp]) continue;
      const ret = spMap[d] / spMap[dp] - 1;
      bhEq *= (1 + ret);
      bhPeak = Math.max(bhPeak, bhEq);
      bhCurve.push({ date: d, value: bhEq });
      bhDD.push({ date: d, value: (bhEq - bhPeak) / bhPeak * 100 });
    }

    // Old strategy
    const oldResult = runStrategy(dates, spMap, hyMap, tipsMap, calcF5Old);
    // New strategy
    const newResult = runStrategy(dates, spMap, hyMap, tipsMap, calcF5New);

    setLoadingText('繪製圖表...'); setProgress(90);

    // Stats
    const oldStats = calcStats(oldResult.equityCurve);
    const newStats = calcStats(newResult.equityCurve);
    const bhStats  = calcStats(bhCurve);

    // Summary table
    const rows = [
      ['總報酬 %', oldStats.totalReturn+'%', newStats.totalReturn+'%', bhStats.totalReturn+'%'],
      ['年化報酬 CAGR', oldStats.cagr+'%', newStats.cagr+'%', bhStats.cagr+'%'],
      ['Sharpe Ratio', oldStats.sharpe, newStats.sharpe, bhStats.sharpe],
      ['最大回撤', oldStats.maxDD+'%', newStats.maxDD+'%', bhStats.maxDD+'%'],
    ];
    const tbody = document.getElementById('summaryTable');
    tbody.innerHTML = '';
    for (const row of rows) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td style="color:var(--muted)">${row[0]}</td>
        <td class="tag-old">${row[1]}</td>
        <td class="tag-new">${row[2]}</td>
        <td class="tag-bh">${row[3]}</td>`;
      tbody.appendChild(tr);
    }

    // Yearly table
    const oldYr = calcYearly(oldResult.equityCurve);
    const newYr = calcYearly(newResult.equityCurve);
    const bhYr  = calcYearly(bhCurve);
    const spYr  = calcYearly(bhCurve); // same as BH for SP500
    const allYears = [...new Set([...Object.keys(oldYr), ...Object.keys(newYr)])].sort();
    const ytbody = document.getElementById('yearlyTable');
    ytbody.innerHTML = '';
    for (const yr of allYears) {
      const o = oldYr[yr] != null ? oldYr[yr].toFixed(1) : '--';
      const n = newYr[yr] != null ? newYr[yr].toFixed(1) : '--';
      const b = bhYr[yr]  != null ? bhYr[yr].toFixed(1)  : '--';
      const colorClass = (v) => parseFloat(v) >= 0 ? 'pos' : 'neg';
      ytbody.innerHTML += `<tr>
        <td>${yr}</td>
        <td class="${colorClass(o)} tag-old">${o}%</td>
        <td class="${colorClass(n)} tag-new">${n}%</td>
        <td class="${colorClass(b)} tag-bh">${b}%</td>
      </tr>`;
    }

    // Charts
    destroyCharts();
    buildEquityChart(oldResult.equityCurve, newResult.equityCurve, bhCurve);
    buildDDChart(oldResult.ddCurve, newResult.ddCurve, bhDD);

    const oldScores = oldResult.shieldHistory.map(s => s.shield);
    const newScores = newResult.shieldHistory.map(s => s.shield);
    buildScoreChart(oldScores, newScores);

    setProgress(100);
    showLoading(false);
    document.getElementById('results').style.display = 'block';
    setStatus('回測完成！數據區間：' + dates[63] + ' ~ ' + dates[dates.length-1], 'ok');

  } catch(e) {
    showLoading(false);
    setStatus('錯誤：' + e.message + '（請確認 API Key 是否正確，或換一個 Proxy）', 'err');
    console.error(e);
  }
}

function showLoading(show, text='', pct=0) {
  document.getElementById('loadingOverlay').classList.toggle('show', show);
  if (text) setLoadingText(text);
  setProgress(pct);
}
function setLoadingText(t) { document.getElementById('loadingText').textContent = t; }
function setProgress(p) { document.getElementById('progressFill').style.width = p + '%'; }
function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}
</script>

</html>
